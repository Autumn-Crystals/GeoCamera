name: ngo_tree_tracker
description: "NGO Tree Plantation Tracking System - Mobile app for tracking tree plantations with geolocation, health monitoring, and offline support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  geolocator: ^14.0.0
  geocoding: ^3.0.0
  shared_preferences: ^2.5.3
  image: ^4.3.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  permission_handler: ^11.4.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.15.0
  sqflite: ^2.3.0
  path: ^1.9.0
  crypto: ^3.0.3
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.0
  connectivity_plus: ^6.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  csv: ^6.0.0
  excel: ^4.0.6
  http: ^1.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"
